# Pin the build so the prebuild step (scripts/resolve-data-tag.ts) runs and
# writes .env.local with VITE_DATA_TAG before vite build. Without `bun run
# build`, the tag is undefined at runtime and the site renders blank.
[build]
  command = "bun run build"
  publish = "dist"

# Vite 8 / @vitejs/plugin-react require Node ^20.19 || >=22.12. Netlify's
# legacy default here was Node 18, which fails the build — pin a supported LTS.
[build.environment]
  NODE_VERSION = "22"
